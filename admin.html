{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>E-Voting System</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="{% static 'default.css' %}" rel="stylesheet">
<link href = "styles.css" rel="stylesheet">
<script>
function validate(){
	var x=document.forms["f1"]["username"].value;
	var y=document.forms["f1"]["password"].value;
	if(x == null || x==""){
		window.alert("Username must be enter");
		document.f1.t1.focus();
		return false;
	}
	if(y == null || y==""){
		window.alert("Finger Password must be uploaded");
		document.f1.t2.focus();
		return false;
	}
	return true;
}
</script>

</head>

<body>

<div id="wrapper">

    <!-- HEADER -->
    <div id="header">
        <div id="logo">
            <h1>E-Voting System Using Ethereum Blockchain</h1>
        </div>
    </div>

    <!-- NAV -->
    <div id="menu">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="admin.html">Admin Login</a></li>
            <li><a href="vote.html">Cast Your Vote</a></li>
        </ul>
    </div>

    <!-- FORM -->
    <div class="entry">

        <center>{{ data }}</center>

        <center><b>Admin Login Screen</b></center>

        <form name="f1" method="post" action="{% url 'AdminLogin' %}" onsubmit="return validate()">
            {% csrf_token %}

            <table class="notepad">

                <tr>
                    <th align="left">Username</th>
                    <td>
                        <input type="text" name="username" class="form-control">
                    </td>
                </tr>

                <tr>
                    <th align="left">Password</th>
                    <td>
                        <input type="password" name="password" class="form-control">
                    </td>
                </tr>

                <tr>
                    <td></td>
                    <td>
                        <input type="submit" value="Login">
                    </td>
                </tr>

            </table>

        </form>

    </div>

</div>

</body>
</html>
